<!DOCTYPE html>
<html lang="pt_BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de cadastro</title>
</head>
<body>
    <header><h1>Formulario de Cadastro</h1></header>

    <form>
        <fieldset>
            <legend>Crie sua Conta</legend>
            
            <label for="nome">Nome:</label><br>
            <input type="text" id="nome" name="nome" ></input><br></br>

            <label for="email">E-mail:</label><br>
            <input type="email" id="email" name="email"></input><br></br>

            <label for="password">Senha:</label><br>
            <input type="password" id="password" name="senha"></input><br></br>

            <strong>Gênero</strong><br></br>
            
            <input type="radio" id="masculino" name="genero" ></input>
            <label for="masculino">Masculino</label><br></br>

            <input type="radio" id="feminino" name="genero"  ></input>
            <label for="feminino">Feminino</label><br></br>

            <input type="radio" id="outro" name="genero" ></input>
            <label for="outro">Outro</label><br></br>

            <label for="biografia">Biografia:</label><br>
            <textarea name="biografia" rows="3" id="biografia" placeholder="Fale um pouco sobre você" required></textarea><br><br>

            <input type="checkbox" required name="termos de serviço" id="check">
            <label for="check">Eu li e aceito os termos de serviço.</label><br>
           
        </fieldset>
        
        <br>
        <button type="submit">Cadastrar</button>
        <button type="reset">Limpar</button>
        
    </form>
    
</body>
</html>
